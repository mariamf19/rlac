title: "Reading Like a Computer — Mariam Fatima"
email:
description: >-
  Course site for CDAD-UH 1024Q: Reading Like a Computer, Spring 2026.
  NYU Abu Dhabi. Assignments, responses, and reflections by Mariam Fatima.
github_username: mariamf19
minimal_mistakes_skin: dark
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: Asia/Dubai

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Mariam Fatima"
  avatar : "/rlac/assets/images/bio-photo.jpg"
  bio    : "Junior at NYU Abu Dhabi studying Interactive Media. This is my course site for CDAD-UH 1024Q: Reading Like a Computer, Spring 2026."
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/mariamf19"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/mariamf19"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
